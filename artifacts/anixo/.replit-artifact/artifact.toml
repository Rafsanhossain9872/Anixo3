kind = "web"
previewPath = "/"
title = "AniXo"
version = "1.0.0"
id = "artifacts/anixo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19704

[services.development]
run = "pnpm --filter @workspace/anixo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/anixo", "run", "build" ]
publicDir = "artifacts/anixo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19704"
BASE_PATH = "/"
